name: Sync Hugging Face Space to GitHub

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-from-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs rsync
          git lfs install

      - name: Clone Private Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          rm -rf /tmp/hf-space

          git clone \
          https://oauth2:${HF_TOKEN}@huggingface.co/spaces/anuragwa022/HuggingClaw \
          /tmp/hf-space

      - name: Sync Files
        run: |
          shopt -s dotglob

          rsync -av --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".cache" \
            --exclude="node_modules" \
            --exclude="*.bin" \
            --exclude="*.safetensors" \
            --exclude="*.gguf" \
            /tmp/hf-space/ ./

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "sync: update from private huggingface space"

      - name: Push Changes
        run: |
          git push origin HEAD
